<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lux & Taurus</title>
    <link rel="icon" type="image/png" href="lt.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#10b981', // Emerald 500
                            600: '#059669', // Emerald 600
                            700: '#047857', // Emerald 700
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <!-- Header -->
        <div class="px-8 pt-8 pb-6 text-center">
            <div class="w-12 h-12 rounded-xl bg-brand-600 flex items-center justify-center shadow-lg shadow-emerald-100 mx-auto mb-4">
                <span class="text-white font-bold text-2xl">L</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">Admin Portal</h2>
            <p class="text-gray-500 text-sm mt-2">Lux & Taurus Internal System</p>
        </div>

        <!-- Form -->
        <form action="/login" method="POST" class="px-8 pb-8 space-y-4">
            
            <!-- Flask Flash Messages (Error Handling) -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="p-3 rounded-lg bg-red-50 border border-red-100 text-red-600 text-sm text-center font-medium animate-pulse">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="ph ph-envelope text-lg"></i>
                    </div>
                    <input type="email" name="email" id="email" required 
                        class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all text-sm" 
                        placeholder="admin@lux-taurus.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="ph ph-lock text-lg"></i>
                    </div>
                    <input type="password" name="password" id="password" required 
                        class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all text-sm" 
                        placeholder="••••••••">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-lg transition-all shadow-md shadow-brand-100 active:scale-95 flex items-center justify-center gap-2">
                    Sign In
                    <i class="ph ph-arrow-right font-bold"></i>
                </button>
            </div>
        </form>
        
        

        <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 text-center">
            <a href="{{ url_for('home') }}" class="text-xs font-medium text-gray-500 hover:text-brand-600 transition-colors flex items-center justify-center gap-1">
                <i class="ph ph-arrow-left"></i> Back to Website
            </a>
            <p class="text-xs text-gray-400">Protected Area • Authorized Personnel Only</p>
        </div>
    </div>

</body>
</html>

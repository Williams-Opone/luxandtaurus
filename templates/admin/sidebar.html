<aside class="w-64 bg-[#0F392B] border-r border-[#0F392B] hidden md:flex flex-col shadow-xl z-10">
    <div class="h-16 flex items-center px-8 border-b border-white/10">
        <span class="font-bold text-white tracking-widest uppercase">LUX <span class="text-emerald-400">&</span> TAURUS</span>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2">
        <a href="{{ url_for('admin_dashboard') }}" 
           class="flex items-center gap-3 px-4 py-3 rounded-md transition-all 
           {{ 'bg-white/10 text-white shadow-sm' if request.endpoint == 'admin_dashboard' else 'text-emerald-100/70 hover:text-white hover:bg-white/5' }}">
            <i class="fas fa-chart-pie w-5"></i>
            <span class="text-sm {{ 'font-bold tracking-wide' if request.endpoint == 'admin_dashboard' else 'font-medium' }}">Overview</span>
        </a>
        
        <a href="{{ url_for('upload_project') }}" 
           class="flex items-center gap-3 px-4 py-3 rounded-md transition-all 
           {{ 'bg-white/10 text-white shadow-sm' if request.endpoint == 'upload_project' else 'text-emerald-100/70 hover:text-white hover:bg-white/5' }}">
            <i class="fas fa-layer-group w-5"></i>
            <span class="text-sm {{ 'font-bold tracking-wide' if request.endpoint == 'upload_project' else 'font-medium' }}">Projects</span>
        </a>

        <a href="{{ url_for('admin_inquiries') }}" 
           class="flex items-center gap-3 px-4 py-3 rounded-md transition-all 
           {{ 'bg-white/10 text-white shadow-sm' if request.endpoint == 'admin_inquiries' else 'text-emerald-100/70 hover:text-white hover:bg-white/5' }}">

            <span class="text-sm {{ 'font-bold tracking-wide' if request.endpoint == 'admin_inquiries' else 'font-medium' }}">Inquiries</span>
            <span class="ml-auto bg-emerald-500 text-xs text-white px-2 py-0.5 rounded-full font-mono font-bold">{{unread_count}}</span>

            <span class="text-sm font-medium">Logout</span>
        </a>

    <div class="p-4 border-t border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
            <span class="text-xs font-mono text-emerald-100/60">SYSTEM_ONLINE</span>
        </div>
